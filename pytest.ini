# pytest configuration for Lifestream tests

[tool:pytest]
testpaths = tests contrib/ffxiv-upload-achievement-icons/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
