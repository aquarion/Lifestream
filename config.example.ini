; ============================================================================
; SCHEDULER CONFIGURATION
; ============================================================================
; Configure import schedules here instead of using crontab.
; Run with: python scheduler.py
;
; Format: job_name = cron_expression
; Optional: job_name = cron_expression | grace=SECONDS coalesce=true/false
;
; grace = misfire grace time in seconds (default 3600)
;         Jobs missed within this window will run once on scheduler start
; coalesce = true/false (default true)  
;         If true, multiple missed runs combine into one execution
;
; Comment out jobs with ; or # to disable them
; ============================================================================

[schedules]
; Social media imports
atproto_posts = 12,42 * * * *
mastodon_toots = */24 * * * *
; tweets = */10 * * * *
tumblr = 37 */2 * * *

; Code/productivity
github_commits = 34 * * * *
wordpress = 2 10,18 * * *

; Gaming
; historic = */15 * * * *
ffxiv = 55 */4 * * *
gw2 = 25 * * * *
steam = 45 */6 * * *
steambadges = 45 1 * * *
; planetside = 55 2 * * *
; destiny2 = 16 */2 * * *
; wow = 18 */2 * * *

; Location/activity
foursquare = 25 4 * * *
; lastfm = */12 * * * *

; Facebook (slower grace time - API rate limits)
facebook_posts = */18 * * * * | grace=7200

; Disabled imports
; mailbox-istic = 45 * * * *
; mailbox-aqcom = 48 * * * *
; oyster_csv = 4 4 * * *
